<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Parametric Speaker Case Generator (Perfect Fit Lid)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; color: #eee; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 15px; left: 15px; z-index: 100; 
            background: rgba(40, 40, 40, 0.95); padding: 15px 20px; 
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            width: 330px; max-height: 90vh; overflow-y: auto;
        }
        h3 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; font-size: 16px; }
        .section-title { font-size: 12px; color: #aaa; margin: 15px 0 5px 0; border-bottom: 1px dotted #555; padding-bottom: 3px; font-weight: bold; }
        .control-group { margin-bottom: 10px; }
        label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .checkbox-label { justify-content: flex-start; gap: 10px; cursor: pointer; align-items: center; margin-top: 5px; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { 
            flex: 1; background-color: #007acc; color: white; border: none; 
            padding: 10px; font-size: 13px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #005f9e; }
        button.alt { background-color: #2ea043; }
        button.alt:hover { background-color: #238636; }
        #info { margin-top: 15px; font-size: 11px; color: #999; line-height: 1.4; }
        .highlight { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>ケース & 端子位置調整</h3>
        
        <div class="section-title">全体サイズ設定</div>
        <div class="control-group">
            <label><span>ケース内寸高さ (mm)</span><span id="valCaseH">35</span></label>
            <input type="range" id="inpCaseH" min="20" max="50" step="1" value="35">
        </div>
        <div class="control-group">
            <label><span>壁の厚み (mm)</span><span id="valWallT">2.0</span></label>
            <input type="range" id="inpWallT" min="1.5" max="4.0" step="0.1" value="2.0">
        </div>

        <div class="section-title" style="color: #58a6ff;">蓋の嵌合（かんごう）設定</div>
        <div class="control-group">
            <label><span>隙間(クリアランス) (mm)</span><span id="valLidClearance" class="highlight">0.3</span></label>
            <input type="range" id="inpLidClearance" min="0" max="1.0" step="0.05" value="0.3">
        </div>
        <div class="control-group">
            <label><span>リップ(差込部)高さ (mm)</span><span id="valLipH">3.0</span></label>
            <input type="range" id="inpLipH" min="1.0" max="8.0" step="0.5" value="3.0">
        </div>
        
        <div class="section-title">DCジャック (背面)</div>
        <div class="control-group">
            <label><span>配置ズレ(X軸) (mm)</span><span id="valDcOffsetX">-12</span></label>
            <input type="range" id="inpDcOffsetX" min="-30" max="30" step="0.5" value="-12">
        </div>
        <div class="control-group">
            <label><span>穴 幅 (mm)</span><span id="valDcW">12</span></label>
            <input type="range" id="inpDcW" min="8" max="18" step="0.5" value="12">
        </div>
        <div class="control-group">
            <label><span>穴 高さ (mm)</span><span id="valDcH">11</span></label>
            <input type="range" id="inpDcH" min="8" max="18" step="0.5" value="11">
        </div>

        <div class="section-title">Audioジャック (右側面)</div>
        <div class="control-group">
            <label><span>配置ズレ(Z軸) (mm)</span><span id="valAudOffsetZ">15</span></label>
            <input type="range" id="inpAudOffsetZ" min="-25" max="25" step="0.5" value="15">
        </div>
        <div class="control-group">
            <label><span>穴 幅 (mm)</span><span id="valAudW">8</span></label>
            <input type="range" id="inpAudW" min="5" max="14" step="0.5" value="8">
        </div>
        <div class="control-group">
            <label><span>穴 高さ (mm)</span><span id="valAudH">7</span></label>
            <input type="range" id="inpAudH" min="5" max="14" step="0.5" value="7">
        </div>

        <div class="section-title">表示切り替え</div>
        <div class="control-group">
            <label class="checkbox-label"><input type="checkbox" id="inpShowLid" checked> 蓋を表示</label>
            <label class="checkbox-label"><input type="checkbox" id="inpShowDummy" checked> ダミー基板・部品を表示</label>
        </div>

        <div class="button-group">
            <button id="btnExportBase">ベースを保存</button>
            <button id="btnExportLid" class="alt">蓋を保存</button>
        </div>
        
        <div id="info">
            ※蓋がキツイ場合は「隙間(クリアランス)」を 0.4～0.5 に、緩い場合は 0.1～0.2 に調整して出力し直してください。（一般的なFDMプリンタは 0.2～0.3 推奨）
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x1e1e1e);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(60, 100, 150);
        controls.target.set(0, 15, 0);
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        const matBase = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 });
        const matLid = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.7, transparent: true, opacity: 0.8 });
        const matDummyBoard = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.3 });
        const matDummyComp = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.6 });
        const matDummyCap = new THREE.MeshBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.5 });

        const baseGroup = new THREE.Group();
        const lidGroup = new THREE.Group();
        const dummyGroup = new THREE.Group();
        scene.add(baseGroup); scene.add(lidGroup); scene.add(dummyGroup);

        const boardW = 98;
        const boardD = 65;
        const clearance = 1.5;
        const standoffH = 5;
        const pcbT = 1.6;

        const inputs = {
            caseH: document.getElementById('inpCaseH'),
            wallT: document.getElementById('inpWallT'),
            lidClearance: document.getElementById('inpLidClearance'),
            lipH: document.getElementById('inpLipH'),
            dcOffsetX: document.getElementById('inpDcOffsetX'),
            dcW: document.getElementById('inpDcW'),
            dcH: document.getElementById('inpDcH'),
            audOffsetZ: document.getElementById('inpAudOffsetZ'),
            audW: document.getElementById('inpAudW'),
            audH: document.getElementById('inpAudH'),
            showLid: document.getElementById('inpShowLid'),
            showDummy: document.getElementById('inpShowDummy'),
        };

        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                const valElem = document.getElementById(`val${key.charAt(0).toUpperCase() + key.slice(1)}`);
                if(valElem) valElem.innerText = e.target.value;
                rebuildModel();
            });
        });

        function createWallWithHole(width, height, thickness, holeX, holeY, holeW, holeH, posX, posY, posZ, rotationY) {
            const group = new THREE.Group();
            
            if (holeY > 0) {
                const bMesh = new THREE.Mesh(new THREE.BoxGeometry(width, holeY, thickness), matBase);
                bMesh.position.set(0, holeY/2 - height/2, 0);
                group.add(bMesh);
            }
            const topH = height - (holeY + holeH);
            if (topH > 0) {
                const tMesh = new THREE.Mesh(new THREE.BoxGeometry(width, topH, thickness), matBase);
                tMesh.position.set(0, height/2 - topH/2, 0);
                group.add(tMesh);
            }
            if (holeX > 0) {
                const lMesh = new THREE.Mesh(new THREE.BoxGeometry(holeX, holeH, thickness), matBase);
                lMesh.position.set(-width/2 + holeX/2, holeY + holeH/2 - height/2, 0);
                group.add(lMesh);
            }
            const rightW = width - (holeX + holeW);
            if (rightW > 0) {
                const rMesh = new THREE.Mesh(new THREE.BoxGeometry(rightW, holeH, thickness), matBase);
                rMesh.position.set(width/2 - rightW/2, holeY + holeH/2 - height/2, 0);
                group.add(rMesh);
            }
            group.position.set(posX, posY, posZ);
            group.rotation.y = rotationY;
            baseGroup.add(group);
        }

        function createSolidWall(width, height, thickness, posX, posY, posZ, rotationY) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, thickness), matBase);
            mesh.position.set(posX, posY, posZ);
            mesh.rotation.y = rotationY;
            baseGroup.add(mesh);
        }

        function rebuildModel() {
            while(baseGroup.children.length > 0) baseGroup.remove(baseGroup.children[0]);
            while(lidGroup.children.length > 0) lidGroup.remove(lidGroup.children[0]);
            while(dummyGroup.children.length > 0) dummyGroup.remove(dummyGroup.children[0]);

            const wallT = parseFloat(inputs.wallT.value);
            const innerH = parseFloat(inputs.caseH.value);
            const lidGap = parseFloat(inputs.lidClearance.value); // 新規: 蓋のクリアランス
            const lipH = parseFloat(inputs.lipH.value);           // 新規: リップの高さ
            const dcOffsetX = parseFloat(inputs.dcOffsetX.value);
            const dcW = parseFloat(inputs.dcW.value);
            const dcH = parseFloat(inputs.dcH.value);
            const audOffsetZ = parseFloat(inputs.audOffsetZ.value);
            const audW = parseFloat(inputs.audW.value);
            const audH = parseFloat(inputs.audH.value);
            
            const outerW = boardW + clearance*2 + wallT*2;
            const outerD = boardD + clearance*2 + wallT*2;
            const outerH = innerH + wallT;
            const holeBaseY = wallT + standoffH + pcbT;

            // 1. ベース
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(outerW, wallT, outerD), matBase);
            bottom.position.y = wallT/2;
            baseGroup.add(bottom);

            const wallCenterY = wallT + innerH/2;

            // 前面
            createSolidWall(outerW, innerH, wallT, 0, wallCenterY, outerD/2 - wallT/2, 0);

            // 背面 (DCジャック)
            const holeDcLocalX = (outerW / 2) + dcOffsetX - dcW/2;
            createWallWithHole(outerW, innerH, wallT, holeDcLocalX, holeBaseY - wallT, dcW, dcH, 0, wallCenterY, -(outerD/2 - wallT/2), 0);

            // 右側面 (Audioジャック)
            const holeAudLocalX = (outerD / 2) - audOffsetZ - audW/2; 
            createWallWithHole(outerD, innerH, wallT, holeAudLocalX, holeBaseY - wallT, audW, audH, outerW/2 - wallT/2, wallCenterY, 0, Math.PI/2);

            // 左側面 (出力配線用)
            const wireW = 15;
            const wireH = 8;
            const holeWireLocalX = (outerD / 2) - wireW/2;
            createWallWithHole(outerD, innerH, wallT, holeWireLocalX, holeBaseY - wallT, wireW, wireH, -(outerW/2 - wallT/2), wallCenterY, 0, Math.PI/2);

            // スペーサー
            const holeX = 88 / 2;
            const holeZ = 55 / 2;
            [[-holeX, -holeZ], [holeX, -holeZ], [-holeX, holeZ], [holeX, holeZ]].forEach(pos => {
                const standoff = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, standoffH, 16), matBase);
                standoff.position.set(pos[0], wallT + standoffH/2, pos[1]);
                baseGroup.add(standoff);
            });

            // 2. 蓋
            if(inputs.showLid.checked) {
                const lidT = wallT;
                const top = new THREE.Mesh(new THREE.BoxGeometry(outerW, lidT, outerD), matLid);
                top.position.y = outerH + lidT/2;
                lidGroup.add(top);

                // --- 蓋のリップ（差し込み部）の精密計算 ---
                // ベースの内寸
                const innerSpaceW = outerW - wallT*2;
                const innerSpaceD = outerD - wallT*2;

                // リップの外寸 = ベース内寸 - 両側のクリアランス
                const lipOuterW = innerSpaceW - (lidGap * 2);
                const lipOuterD = innerSpaceD - (lidGap * 2);

                // リップの厚み (1.5mm程度を確保、ただし壁よりは薄くする)
                const lipThickness = Math.min(1.5, wallT - 0.2); 

                // 前後のリップ板
                const lipF = new THREE.Mesh(new THREE.BoxGeometry(lipOuterW, lipH, lipThickness), matLid);
                lipF.position.set(0, outerH - lipH/2, lipOuterD/2 - lipThickness/2);
                const lipB = new THREE.Mesh(new THREE.BoxGeometry(lipOuterW, lipH, lipThickness), matLid);
                lipB.position.set(0, outerH - lipH/2, -(lipOuterD/2 - lipThickness/2));
                
                // 左右のリップ板 (前後の板に挟まれるように幅を計算)
                const lipSideD = lipOuterD - (lipThickness * 2);
                const lipL = new THREE.Mesh(new THREE.BoxGeometry(lipThickness, lipH, lipSideD), matLid);
                lipL.position.set(-(lipOuterW/2 - lipThickness/2), outerH - lipH/2, 0);
                const lipR = new THREE.Mesh(new THREE.BoxGeometry(lipThickness, lipH, lipSideD), matLid);
                lipR.position.set(lipOuterW/2 - lipThickness/2, outerH - lipH/2, 0);

                lidGroup.add(lipF); lidGroup.add(lipB); lidGroup.add(lipL); lidGroup.add(lipR);
                
                // プレビュー用に蓋を少し浮かせる
                lidGroup.position.y = 15; 
            }

            // 3. ダミー部品
            if(inputs.showDummy.checked) {
                const pcb = new THREE.Mesh(new THREE.BoxGeometry(boardW, pcbT, boardD), matDummyBoard);
                pcb.position.y = wallT + standoffH + pcbT/2;
                dummyGroup.add(pcb);

                const dc = new THREE.Mesh(new THREE.BoxGeometry(dcW-1, dcH-1, 14), matDummyComp);
                dc.position.set(dcOffsetX, holeBaseY + dcH/2, -boardD/2 + 7);
                dummyGroup.add(dc);

                const aud = new THREE.Mesh(new THREE.BoxGeometry(14, audH-1, audW-1), matDummyComp);
                aud.position.set(boardW/2 - 7, holeBaseY + audH/2, audOffsetZ);
                dummyGroup.add(aud);

                const capH = 25;
                const cap = new THREE.Mesh(new THREE.CylinderGeometry(8, 8, capH, 16), matDummyCap);
                cap.position.set(-20, holeBaseY + capH/2, 15);
                dummyGroup.add(cap);
            }
        }

        function exportSTL(group, filename) {
            const exporter = new THREE.STLExporter();
            const stlString = exporter.parse(group);
            const blob = new Blob([stlString], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        document.getElementById('btnExportBase').addEventListener('click', () => { exportSTL(baseGroup, 'ts_speaker_base.stl'); });
        document.getElementById('btnExportLid').addEventListener('click', () => {
            const currentY = lidGroup.position.y;
            lidGroup.position.y = 0;
            lidGroup.updateMatrixWorld(true);
            exportSTL(lidGroup, 'ts_speaker_lid.stl');
            lidGroup.position.y = currentY;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        rebuildModel();
        animate();
    </script>
</body>
</html>
